# ======================== Server ========================
server.port=8080

# ======================== Spring ========================
spring.application.name=farm

# SQL init
spring.sql.init.mode=never

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# DataSource (PostgreSQL + Druid)
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:47.120.33.197}:5432/misdb
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234567890}

# JPA / Hibernate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.naming.physical-strategy=cn.jxufe.farm.database.PostgreSQLServerNamingStrategy
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.check-template=false

# ======================== SpringDoc OpenAPI ========================
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=cn.jxufe
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ======================== Farm File Storage ========================
farm.file.storage-root=${FILE_STORAGE_ROOT:./static/oss}
farm.file.public-prefix=${FILE_PUBLIC_PREFIX:/oss}

# ======================== Farm WebSocket Logging ========================
farm.logging.websocket.file-path=${FARM_WEBSOCKET_LOG_FILE:logs/farm-realtime.log}
farm.logging.websocket.level=${FARM_WEBSOCKET_LOG_LEVEL:DEBUG}

# ======================== Farm Gameplay ========================
# Realtime crop status
farm.gameplay.realtime.crop-status-refresh-interval-ms=${CROP_STATUS_REFRESH_INTERVAL_MS:1000}
farm.gameplay.realtime.scheduler.parallelism=${CROP_STATUS_SCHEDULER_PARALLELISM:4}
farm.gameplay.realtime.scheduler.partition-size=${CROP_STATUS_SCHEDULER_PARTITION_SIZE:500}

# Plot unlock policy
farm.gameplay.policy.plot.unlock.free-plot-index-limit=${PLOT_UNLOCK_FREE_INDEX_LIMIT:3}
farm.gameplay.policy.plot.unlock.base-cost-coin=${PLOT_UNLOCK_BASE_COST_COIN:80}
farm.gameplay.policy.plot.unlock.cost-step-coin=${PLOT_UNLOCK_COST_STEP_COIN:40}
farm.gameplay.policy.plot.unlock.base-required-experience=${PLOT_UNLOCK_BASE_REQUIRED_EXPERIENCE:100}
farm.gameplay.policy.plot.unlock.required-experience-step=${PLOT_UNLOCK_REQUIRED_EXPERIENCE_STEP:100}

# Plot defaults
farm.gameplay.policy.plot.defaults.total-plot-count=${PLOT_DEFAULT_TOTAL_COUNT:6}
farm.gameplay.policy.plot.defaults.unlocked-plot-count=${PLOT_DEFAULT_UNLOCKED_COUNT:1}
