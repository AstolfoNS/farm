server:
  port: 8080

spring:
  application:
    name: farm

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:8.154.36.28}:5432/misdb
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234567890}

  jpa:
    # 建议生产环境关闭，通过 application-dev.yml 开启
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      naming:
        physical-strategy: cn.jxufe.farm.database.PostgreSQLServerNamingStrategy
    # 强烈建议关闭，防止连接池耗尽
    open-in-view: false

  thymeleaf:
    check-template: false

springdoc:
  api-docs:
    enabled: true
  packages-to-scan: cn.jxufe
  swagger-ui:
    path: /test

farm:
  file:
    storage-root: ${FILE_STORAGE_ROOT:./static/oss}
    public-prefix: ${FILE_PUBLIC_PREFIX:/oss}
  logging:
    websocket:
      file-path: ${FARM_WEBSOCKET_LOG_FILE:logs/farm-realtime.log}
      level: ${FARM_WEBSOCKET_LOG_LEVEL:DEBUG}
  gameplay:
    realtime:
      crop-status-refresh-interval-ms: ${CROP_STATUS_REFRESH_INTERVAL_MS:1000}
      scheduler:
        parallelism: ${CROP_STATUS_SCHEDULER_PARALLELISM:4}
        partition-size: ${CROP_STATUS_SCHEDULER_PARTITION_SIZE:500}
    policy:
      plot:
        unlock:
          free-plot-index-limit: ${PLOT_UNLOCK_FREE_INDEX_LIMIT:3}
          base-cost-coin: ${PLOT_UNLOCK_BASE_COST_COIN:80}
          cost-step-coin: ${PLOT_UNLOCK_COST_STEP_COIN:40}
        expand:
          free-plot-count-limit: ${PLOT_EXPAND_FREE_COUNT_LIMIT:3}
          base-cost-coin: ${PLOT_EXPAND_BASE_COST_COIN:100}
          cost-step-coin: ${PLOT_EXPAND_COST_STEP_COIN:50}
        defaults:
          total-plot-count: ${PLOT_DEFAULT_TOTAL_COUNT:6}
          unlocked-plot-count: ${PLOT_DEFAULT_UNLOCKED_COUNT:1}
