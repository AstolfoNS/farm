spring:
  application:
    name: farm
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:8.154.36.28}:5432/misdb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234567890}

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        naming:
          physical-strategy: cn.jxufe.fram.database.PostgreSQLServerNamingStrategy

springdoc:
  api-docs:
    enabled: true
  packages-to-scan: cn.jxufe
  swagger-ui:
    path: /test


server:
  port: 8080
  servlet:
    context-path: /api/${VERSION:v1}
