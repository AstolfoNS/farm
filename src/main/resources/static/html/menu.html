<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/easyui/jquery.min.js"></script>
    <style>
        body {
            margin: 0;
            background: url('/images/topbar.png') repeat-x;
            background-size: auto 60px;
            height: 60px;
            overflow: hidden;
        }

        .nav-container {
            position: absolute;
            right: 10px;
            top: 6px;
            display: flex;
            align-items: center;
        }

        .nav-icon {
            width: 46px;
            height: 46px;
            cursor: pointer;
            border: 2px solid #5a2d00;
            border-radius: 6px;
            background: #efe8d6;
            box-shadow: 0 0 0 1px #caa35a inset;
            transition: transform 0.2s;
        }

        .nav-icon:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="nav-container">
    <img id="seedShopIcon" src="/images/seedManager.png" class="nav-icon" title="种子管理">
</div>
<script>
    $(function () {
        $('#seedShopIcon').on('click', function () {
            parent.frames['workspace'].location.href = 'seed_list.html';
        });
    });
</script>
</body>
</html>
