<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/easyui/jquery.min.js"></script>
    <script src="/js/farm-realtime.js"></script>
    <style>
        body {
            margin: 0;
            background: url('/images/topbar.png') repeat-x;
            background-size: auto 60px;
            height: 60px;
            overflow: hidden;
        }

        .top-user {
            position: absolute;
            left: 8px;
            top: 3px;
            height: 54px;
            display: flex;
            align-items: center;
            padding: 0 8px 0 0;
            background: rgba(25, 140, 175, 0.62);
            border-radius: 4px;
        }

        .top-user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #103f63;
            object-fit: cover;
            background: #fff;
        }

        .top-user-info {
            margin-left: 8px;
            line-height: 1.1;
            color: #ffd600;
            text-shadow: 1px 1px 1px #6f4f00;
        }

        .top-user-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: -1px;
        }

        .top-user-stats {
            margin-top: 2px;
            font-size: 14px;
            color: #b8f5ff;
        }

        .stats-number {
            color: #fff;
        }

        .stats-coin {
            color: #ffd24a;
        }

        .stats-score {
            color: #ff88c8;
        }

        .nav-container {
            position: absolute;
            right: 10px;
            top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .realtime-state {
            position: absolute;
            right: 176px;
            top: 22px;
            min-width: 62px;
            text-align: center;
            padding: 1px 6px;
            border-radius: 10px;
            border: 1px solid #3b4f60;
            font-size: 12px;
            color: #fff;
            background: rgba(0, 0, 0, 0.35);
            user-select: none;
        }

        .realtime-state.connected {
            background: rgba(34, 139, 34, 0.78);
            border-color: #59cf59;
        }

        .realtime-state.connecting,
        .realtime-state.reconnecting {
            background: rgba(206, 136, 0, 0.82);
            border-color: #ffd27f;
        }

        .realtime-state.closed,
        .realtime-state.error,
        .realtime-state.stopped {
            background: rgba(159, 42, 42, 0.82);
            border-color: #ff9999;
        }

        .nav-icon {
            width: 46px;
            height: 46px;
            cursor: pointer;
            border: 2px solid #5a2d00;
            border-radius: 6px;
            background: #efe8d6;
            box-shadow: 0 0 0 1px #caa35a inset;
            transition: transform 0.2s;
        }

        .nav-icon:hover {
            transform: scale(1.05);
        }

        .nav-icon.active {
            border-color: #8cff66;
            box-shadow: 0 0 0 2px #2f7200 inset;
        }
    </style>
</head>
<body>
<div class="top-user">
    <img id="curUserHead" class="top-user-avatar" src="/images/unknownUser.png" alt="头像">
    <div class="top-user-info">
        <div id="curUserName" class="top-user-name">未知用户</div>
        <div class="top-user-stats">
            经验：<span id="curUserExp" class="stats-number">0</span>
            金币：<span id="curUserCoin" class="stats-coin">0</span>
            积分：<span id="curUserScore" class="stats-score">0</span>
        </div>
    </div>
</div>

<div id="realtimeState" class="realtime-state">未连接</div>

<div class="nav-container">
    <img id="loginUserIcon" src="/images/userSelect.png" class="nav-icon" title="用户登录">
    <img id="userManagerIcon" src="/images/userManager.png" class="nav-icon" title="玩家管理">
    <img id="seedShopIcon" src="/images/seedManager.png" class="nav-icon" title="种子管理">
</div>

<script>
    $(function () {
        var currentRealtimeUserId = 0;
        var latestUserRefreshAt = 0;

        function setRealtimeStateClass(name) {
            var cls = 'idle connecting connected reconnecting closed error stopped';
            $('#realtimeState').removeClass(cls).addClass(name || 'idle');
        }

        function setRealtimeStateText(name) {
            var textMap = {
                idle: '未连接',
                connecting: '连接中',
                connected: '实时在线',
                reconnecting: '重连中',
                closed: '已断开',
                error: '连接异常',
                stopped: '已停止'
            };
            $('#realtimeState').text(textMap[name] || '未连接');
            setRealtimeStateClass(name);
        }

        function renderTopUser(user) {
            var data = user || {};
            $('#curUserHead').attr('src', data.head || '/images/unknownUser.png');
            $('#curUserName').text(data.nickname || '未知用户');
            $('#curUserExp').text(Number(data.experience || 0));
            $('#curUserCoin').text(Number(data.coin || 0));
            $('#curUserScore').text(Number(data.score || 0));
        }

        function ensureRealtimeClient(user) {
            var uid = Number((user && user.id) || 0);
            if (!uid || uid <= 0) {
                if (window.FarmRealtimeClient) {
                    window.FarmRealtimeClient.stop();
                }
                currentRealtimeUserId = 0;
                setRealtimeStateText('stopped');
                return;
            }
            if (!window.FarmRealtimeClient) {
                return;
            }
            if (!currentRealtimeUserId) {
                currentRealtimeUserId = uid;
                window.FarmRealtimeClient.start({
                    userId: uid,
                    onStatus: function (statusName) {
                        setRealtimeStateText(statusName);
                    }
                });
                return;
            }
            if (currentRealtimeUserId !== uid) {
                currentRealtimeUserId = uid;
                window.FarmRealtimeClient.switchUser(uid);
            }
        }

        function refreshCurrentUserInfo(force) {
            $.getJSON('/user/getCurUser', function (res) {
                if (res && res.code === 0 && res.data) {
                    renderTopUser(res.data);
                    ensureRealtimeClient(res.data);
                    if (force) {
                        latestUserRefreshAt = Date.now();
                    }
                }
            });
        }

        function setActiveByWorkspace() {
            var href = '';
            try {
                href = parent.frames['workspace'].location.href || '';
            } catch (e) {
                href = '';
            }
            $('#seedShopIcon').removeClass('active');
            $('#userManagerIcon').removeClass('active');
            if (href.indexOf('seed_list.html') >= 0) {
                $('#seedShopIcon').addClass('active');
            } else if (href.indexOf('user_list.html') >= 0) {
                $('#userManagerIcon').addClass('active');
            }
        }

        function openUserLoginPanel() {
            var workspace = parent.frames['workspace'];
            if (workspace && typeof workspace.openUserLoginPanel === 'function') {
                workspace.openUserLoginPanel();
                return;
            }
            parent.frames['workspace'].location.href = 'welcome.html?showLogin=1';
        }

        $('#loginUserIcon').on('click', function () {
            openUserLoginPanel();
        });

        $('#userManagerIcon').on('click', function () {
            parent.frames['workspace'].location.href = 'user_list.html';
            setActiveByWorkspace();
        });

        $('#seedShopIcon').on('click', function () {
            parent.frames['workspace'].location.href = 'seed_list.html';
            setActiveByWorkspace();
        });

        $(document).on('farm:realtime:overview', function (event, payload) {
            var data = payload || {};
            var overview = data.overview || {};

            var workspace = parent.frames['workspace'];
            if (workspace && typeof workspace.onFarmRealtimeOverview === 'function') {
                workspace.onFarmRealtimeOverview(overview, data);
            }

            if (overview && Number(overview.userId || 0) === Number(currentRealtimeUserId || 0)) {
                var now = Date.now();
                if (now - latestUserRefreshAt >= 1500) {
                    latestUserRefreshAt = now;
                    refreshCurrentUserInfo(false);
                }
            }
        });

        window.refreshCurrentUserInfo = refreshCurrentUserInfo;
        refreshCurrentUserInfo(true);
        setRealtimeStateText('idle');
        setActiveByWorkspace();
        setInterval(setActiveByWorkspace, 800);
        setInterval(function () {
            refreshCurrentUserInfo(false);
        }, 5000);
    });
</script>
</body>
</html>
