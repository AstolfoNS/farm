<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>种子清单</title>
    <link rel="stylesheet" type="text/css" href="/js/easyui/themes/default/easyui.css">
    <link rel="stylesheet" type="text/css" href="/js/easyui/themes/icon.css">
    <link rel="stylesheet" type="text/css" href="/css/farm-theme.css">
    <script src="/js/easyui/jquery.min.js"></script>
    <script src="/js/easyui/jquery.easyui.min.js"></script>
    <script src="/js/easyui/plugins/jquery.edatagrid.js"></script>
    <script src="/js/easyui/locale/easyui-lang-zh_CN.js"></script>
</head>
<body class="easyui-layout">

<div data-options="region:'center',border:false">
    <!-- 数据表格 -->
    <table id="grid"></table>
</div>

<!-- 工具栏 -->
<div id="seedTb" style="padding:10px;">
    <span style="color: white">种子名称:</span>
    <input id="nameSearch" class="easyui-textbox" style="width:140px">
    <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-search'" onclick="doSearch()">查询</a>
    <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="grid.edatagrid('addRow')">新增</a>
    <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-edit'" onclick="editRow()">弹窗编辑</a>
    <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-undo'" onclick="grid.edatagrid('cancelRow')">取消</a>
    <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-cancel'" onclick="grid.edatagrid('destroyRow')">删除</a>
</div>

<!-- 弹窗编辑表单 -->
<div id="formContainer" class="easyui-dialog" title="编辑种子信息" style="width:800px; padding:20px;" closed="true" buttons="#formSeedButtons">
    <form id="formEditor" method="POST">
        <input type="hidden" name="id" value="0">
        <table class="tbledit" style="width:100%; border-spacing:10px;">
            <tr>
                <td style="width:15%">ID：</td>
                <td style="width:35%"><input name="id" class="easyui-textbox" style="width:160px" readonly></td>
                <td style="width:15%">种子ID：</td>
                <td style="width:35%"><input name="seedId" class="easyui-numberbox" required="true" style="width:160px"></td>
            </tr>
            <tr>
                <td>种子名称：</td>
                <td><input name="name" class="easyui-textbox" required="true" style="width:160px"></td>
                <td>X季作物：</td>
                <td><input name="season" class="easyui-numberbox" style="width:160px"></td>
            </tr>
            <tr>
                <td>种子等级：</td>
                <td><input name="level" class="easyui-numberspinner" data-options="min:1" style="width:160px"></td>
                <td>种子类型：</td>
                <td>
                    <select name="type" class="easyui-combobox" data-options="panelHeight:'auto',editable:false" style="width:160px">
                        <option value="普通">普通</option>
                        <option value="稀有">稀有</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>可获经验：</td>
                <td><input name="exp" class="easyui-numberbox" style="width:160px"></td>
                <td>每季成熟所需时间：</td>
                <td><input name="timeNeeded" class="easyui-numberbox" data-options="suffix:'秒'" style="width:160px"></td>
            </tr>
            <tr>
                <td>每季成熟可获收成：</td>
                <td><input name="harvestCount" class="easyui-numberbox" data-options="suffix:'个果实'" style="width:160px"></td>
                <td>种子采购价：</td>
                <td><input name="buyPrice" class="easyui-numberbox" data-options="suffix:'个金币'" style="width:160px"></td>
            </tr>
            <tr>
                <td>每个收获的果实单价：</td>
                <td><input name="fruitPrice" class="easyui-numberbox" data-options="suffix:'个金币'" style="width:160px"></td>
                <td>土地需求：</td>
                <td>
                    <select name="soil" class="easyui-combobox" data-options="panelHeight:'auto',editable:false" style="width:160px">
                        <option value="黄土地">黄土地</option>
                        <option value="红土地">红土地</option>
                        <option value="黑土地">黑土地</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>每季成熟可获积分：</td>
                <td><input name="score" class="easyui-numberbox" style="width:160px"></td>
                <td>提示信息：</td>
                <td><input name="tips" class="easyui-textbox" style="width:160px"></td>
            </tr>
        </table>
    </form>
</div>

<div id="formSeedButtons">
    <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-ok" onclick="saveForm()">保存</a>
    <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-cancel" onclick="$('#formContainer').dialog('close')">关闭</a>
</div>

<script>
    let grid;
    $(function () {
        grid = $('#grid').edatagrid({
            url: '/seed/gridDataFilterSortPage',
            saveUrl: '/seed/addOrUpdate',
            updateUrl: '/seed/addOrUpdate',
            destroyUrl: '/seed/delete',
            toolbar: '#seedTb',
            fit: true,
            pagination: true,
            striped: true,
            idField: 'id',
            columns: [[
                {field: 'id', title: 'ID', width: 50},
                {field: 'seedId', title: '种子ID', width: 50},
                {field: 'seedName', title: '种子名称', width: 100},
                {field: 'cropType', title: 'X季作物', width: 80},
                {field: 'seedLevel', title: '种子等级', width: 80},
                {field: 'exp', title: '可获经验', width: 80},
                {field: 'growTime', title: '每季成熟所需时', width: 100},
                {field: 'harvestCount', title: '每季成熟可收获', width: 100},
                {field: 'buyPrice', title: '种子采购价', width: 80},
                {field: 'fruitPrice', title: '每个收获的果实', width: 100},
                {field: 'landRequirement', title: '土地需求', width: 80},
                {field: 'points', title: '每季成熟可获积分', width: 100},
                {field: 'tips', title: '提示信息', width: 150},
                {field: 'action', title: '操作', width: 100, align: 'center',
                    formatter: function (value, row) {
                        return '<a href="javascript:void(0)" class="btn-action" onclick="showGrowthStage(' + row.id + ')">成长阶</a>';
                    }
                }
            ]]
        });
    });

    function doSearch() {
        grid.datagrid("load", { name: $("#nameSearch").val() });
    }

    function editRow() {
        var row = grid.datagrid('getSelected');
        if (row) {
            $('#formContainer').dialog('open');
            $('#formEditor').form('load', row);
        }
    }

    function saveForm() {
        $('#formEditor').form('submit', {
            url: '/seed/addOrUpdate',
            success: function (result) {
                var res = JSON.parse(result); // 使用标准 JSON 解析
                if (res.code === 0) {
                    $('#formContainer').dialog('close');
                    grid.datagrid('reload');
                }
                $.messager.show({ title: "提示", msg: res.msg });
            }
        });
    }

    function showGrowthStage(id) {
        $.messager.alert("提示", "正在查看 ID 为 " + id + " 的成长详情");
    }
</script>
</body>
</html>
